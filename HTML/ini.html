<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Gift</title>
  <link rel="stylesheet" href="https://kyy-coding.github.io/ProjectHTMl/HTML/css/HBD2.css">
</head>
<body>
<div class="background-overlay" id="bgOverlay" style="background-image: url('https://kyy-coding.github.io/ProjectHTMl/background/Background.jpg');"></div>
<div class="circ"><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div></div>

<div id="hal1">
  <div class="envlope-wrapper">
    <div id="envelope" class="close">
      <div class="front flap"></div>
      <div class="front pocket"></div>
      <div class="letter">
        <div class="message"><p>Halooo</p></div>
      </div>
      <div class="hearts"><div class="heart a1"></div><div class="heart a2"></div><div class="heart a3"></div></div>
      <div class="sparkles"><div class="sparkle s1"></div><div class="sparkle s2"></div><div class="sparkle s3"></div></div>
    </div>
  </div>
  <div class="reset"><button id="btnBuka">Buka Amplop ✨</button></div>
</div>

<div id="story-container" class="sembunyi">
  <div id="message-box">
     <img id="sticker" src="" alt="Stiker" style="display: block; margin: 0 auto 15px; max-width: 120px; border-radius: 20px;">
    <h2 id="title"></h2>
    <div id="containerPesan">
      <p id="text"></p>
      <button id="nextBtn" style="display: none;">Lanjut →</button>
      <div id="memory-container" class="sembunyi">
        <div id="papanGame" class="papanGame"></div>
        <p id="statusGame" style="font-size: 0.9rem; text-align: center; margin-top: 8px;"></p>
      </div>
      <div id="gift-container" class="sembunyi">
        <div class="gift-content">
          <div class="wish-title">🎂 Make a Wish 🌙</div>
          <div class="kue-container">
            <div class="lilin-container">
              <div class="lilin">
                <div class="api" id="apiLilin"></div>
              </div>
            </div>
            <div class="kue">
              <div class="lapisan lapisan-atas">
                <div class="frosting"></div>
                <div class="sprinkle"></div><div class="sprinkle"></div><div class="sprinkle"></div><div class="sprinkle"></div><div class="sprinkle"></div><div class="sprinkle"></div>
              </div>
              <div class="lapisan lapisan-tengah">
                <div class="frosting"></div>
                <div class="sprinkle"></div><div class="sprinkle"></div><div class="sprinkle"></div>
              </div>
              <div class="lapisan lapisan-bawah">
                <div class="frosting"></div>
                <div class="sprinkle"></div><div class="sprinkle"></div><div class="sprinkle"></div>
              </div>
            </div>
          </div>
          <div class="wish-instruction">
            <p>Tutup matamu, buat permintaan,<br>lalu tiup lilinnya yaw! 😊</p>
          </div>
          <button id="tiupBtn">🎂 Tiup Lilin 🎂</button>
        </div>
      </div>
    </div>
  </div>
</div>
<audio id="bgAudio" src="https://kyy-coding.github.io/ProjectHTMl/Music/music3.mp3"></audio>
<script src="https://kyy-coding.github.io/ProjectHTMl/HTML/JS/HBD/HBD2.js"></script>
</body>
</html>
